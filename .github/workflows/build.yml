name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            name: macOS ARM64
            artifact-name: chromatic-macos-arm64
            lib-ext: dylib
          - os: macos-15-intel
            arch: x64
            name: macOS x64
            artifact-name: chromatic-macos-x64
            lib-ext: dylib
          - os: ubuntu-24.04
            arch: x64
            name: Linux x64
            artifact-name: chromatic-linux-x64
            lib-ext: so
          - os: ubuntu-24.04-arm
            arch: arm64
            name: Linux ARM64
            artifact-name: chromatic-linux-arm64
            lib-ext: so
          - os: windows-latest
            arch: x64
            name: Windows x64
            artifact-name: chromatic-windows-x64
            lib-ext: dll

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: 3.0.7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install TS dependencies
        working-directory: src/core/typescript
        run: pnpm install

      - name: Build TypeScript
        working-directory: src/core/typescript
        run: pnpm build

      - name: Install Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Configure xmake (Linux)
        if: runner.os == 'Linux'
        run: |
          xmake f -m releasedbg -v -y --toolchain=clang
      
      - name: Configure xmake (macOS)
        if: runner.os == 'macOS'
        run: |
          xmake f -m releasedbg -v -y

      - name: Configure xmake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          xmake f -m releasedbg -v -y

      - name: Build
        run: xmake build -v -y

      - name: Test
        run: xmake run chromatic-test

      - name: List build artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "=== Build directory structure ==="
          find build -type f -name "*chromatic*" 2>/dev/null || echo "No artifacts found"
          echo "=== All build files ==="
          find build -type f 2>/dev/null | head -20

      - name: List build artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "=== Build directory structure ==="
          Get-ChildItem -Path build -Recurse -Filter "*chromatic*" -ErrorAction SilentlyContinue | Select-Object FullName
          echo "=== All build files ==="
          Get-ChildItem -Path build -Recurse -ErrorAction SilentlyContinue | Select-Object -First 20 FullName

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            build/**/*chromatic*
            build/**/*.${{ matrix.lib-ext }}
            src/core/typescript/dist/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload full build directory (debug)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-full-build
          path: build/
          retention-days: 7
